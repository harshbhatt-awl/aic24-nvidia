# ============================================================================
#   v3.3 LOCKED BASELINE (v3.2 + eps_scpt re-tuned 0.20->0.15 on the kp3 set)
# ============================================================================
#
# The reference all experiments are compared against:
#
#   * Models:   YOLO11 (detector) + SOLIDER Swin-Small (ReID, native repo path)
#               + RTMPose-l (pose). All three swapped in over the original
#               YOLOX-x / OSNet / HRNet stack from upstream YACHIYO.
#   * Tracker:  YACHIYO SCPT/MCPT with sweep-tuned thresholds (see below).
#   * World projection: RTMPose ankle-lower keypoint (planted foot) instead of
#                       bbox-bottom-center; EMA temporal smoothing at α=0.3.
#   * Measured: world HOTA 0.6479, DetA 0.6549, AssA 0.6423, IDF1 0.8040, dropped 6347;
#               image HOTA 0.7677, IDF1 0.7521, MOTA 0.7810.
#   * vs v3.2 (eps_scpt=0.20): world HOTA +0.0121 (DetA +0.0057, AssA +0.0183,
#               IDF1 +0.0238) — a deliberate WORLD↔IMAGE TRADE: image HOTA -0.0123
#               (0.7800->0.7677). eps_scpt 0.15 is the world-HOTA peak on the kp3
#               set and narrows the image↔world gap 0.144->0.120 (the project's
#               headline goal). World HOTA is the priority metric, so 0.15 is
#               chosen — same world-over-image call the project made at v3
#               (0.30->0.20). To prefer image-plane parity, revert eps_scpt to 0.20.
#   * vs v3.1 (kpt_cond_th=1, eps_scpt=0.20): world HOTA +0.1197 (0.5282->0.6479,
#               +22.7% relative), image HOTA -0.0123. The keypoint-gate opening
#               (v3.2, +0.1076 world at ZERO image cost) is the bulk and clean;
#               the eps_scpt step (v3.3) is the marginal world/image trade.
#   * vs v2 (bbox_bottom + no smoothing + eps_scpt=0.30): world HOTA +0.190.
#
# Tuning provenance
# -----------------
# - epsilon_scpt 0.15: 2026-05-31 re-sweep against v3.2 (kp3). The v3.1 optimum
#   was 0.20 (0.15/0.10 then regressed); opening the keypoint gate (kp3) shifted
#   the SCT-clustering optimum DOWN — 0.15 now wins (+0.0121 world HOTA, and
#   improves DetA/AssA/IDF1 together), 0.10 is +0.0082, 0.20 is the v3.2 value,
#   0.25+ regress. History: v2-era 0.30 (optimal under bbox_bottom + no
#   smoothing) -> v3 0.20 -> v3.3 0.15. The optimum tightens as upstream world
#   coords / track admission improve.
# - epsilon_mcpt 0.37 / sim_th 0.85: 2026-05-27 sweep; re-confirmed optimal
#   against v3 on 2026-05-28.
# - keypoint_condition_th 3: 2026-05-31 linking_gate_sweep. This MCPT gate
#   excludes a track from cross-camera clustering when its representative pose
#   `score > keypoint_condition_th` (lower score = better keypoints). At the
#   v3.1 value of 1 it dropped 12,126 detections (74% of the entire 55% linking
#   loss) — verified by aic24_nvidia/diagnostics/linking_attribution. Opening it
#   to 3 admits score-2/3 tracks (world DetA 0.44->0.65, world HOTA +0.1076 vs
#   v3.1); going on to 4 (admit-all) regresses vs 3 (world HOTA -0.008, AssA
#   -0.026 kp4-vs-kp3) because score-4 poses are too noisy.
#   Attribution: docs/superpowers/specs/2026-05-31-mct-linking-attribution-design.md.
#   NOTE single-scene caveat: like all baseline tuning, fit on scene_044 only.
# - short_track_th 120 kept: the linking_gate_sweep showed lowering it
#   (60/30/15) moves world HOTA <+0.003 — the short-track (E1) drops are
#   low-value fragments, not worth admitting.
# - world_projection.method = ankle_lower: 2026-05-28 ankle_footpoint_sweep
#   (+0.0349 world HOTA standalone over bbox_bottom). ankle_avg and
#   ankle_w_fallback both regressed (-0.031); the planted-foot logic wins
#   because mid-stride averaging puts the projection point above the ground
#   plane.
# - world_smoothing.method = ema, ema_alpha = 0.3: 2026-05-28
#   world_smoother_sweep and ankle_lower_x_smoother sweeps. Plateau across
#   alpha 0.25-0.35; 0.3 marginally best at +0.0173 standalone, +0.0123 on
#   top of ankle_lower. α<0.2 over-smooths and regresses below baseline.
# - Sweep findings: docs/superpowers/notes/2026-05-28-world-projection-results.md
#
# Known no-op / insensitive knobs (re-confirmed dead at v3.2, 2026-05-31)
# -----------------------------------------------------------
# - hard_world_gate ON vs OFF: identical at v3.1 AND v3.2. Confirmed not binding.
# - sim_th 0.75 / 0.85 / 0.92: identical at v3.1 AND v3.2. The MCPT leftover-
#   assignment path that uses sim_th isn't exercised in this scene.
# - delete_gid_th: baseline 5000 deletes ALL global ids (max gid=1570 dets) ->
#   empty fixed_whole -> pipeline falls back to the RAW whole_tracking_results.
#   2026-05-31 delete_gid_sweep (run at eps_scpt=0.20, i.e. the v3.2 base):
#   ACTIVATING the correction (delete_gid_th 0/50/100, fixed_whole used) REGRESSES
#   world HOTA (0.6305 < 0.6359 raw, both at eps_scpt=0.20) — the MCPT tracklet-
#   interpolation/pruning "correction" is net-negative for this scene. Keep 5000
#   (raw fallback is optimal). 800 spikes AssA to 0.74 but craters DetA to 0.44.
#   (Sweep predates the v3.3 eps_scpt retune; not re-run since the conclusion —
#   correction is net-negative — is independent of eps_scpt.)
#
# Known remaining bottlenecks (not addressed on this branch)
# ----------------------------------------------------------
# - World AssA (0.6423) is the remaining world-HOTA ceiling. The cheap
#   association knobs are exhausted (2026-05-31): eps_mcpt 0.37 still optimal on
#   the kp3 set, sim_th / hard_world_gate / delete_gid_th all dead (see above).
#   The only remaining AssA lever is the reid fine-tune (Colab, needs GPU/user):
#   docs/superpowers/specs/2026-05-28-reid-fine-tune-design.md.
# - YOLO detector recall on cams 0395 (56%) / 0396 (35%): caps per-camera IMAGE
#   HOTA at 0.48 / 0.43. Deprioritized — detection is not the world-HOTA
#   bottleneck (verified 2026-05-31, detect_conf_sweep abandoned).
#
# DO NOT edit this file to "try something" — that's what experiments/ is for.
# Update only when you decide a new tuning is officially the baseline, then
# rebuild outputs/baseline/ with:
#   rm -rf outputs/baseline/{sct,mct,evaluate}
#   python pipeline.py all --config configs/baseline.yaml --run-id baseline
# (cached detect/reid/pose stages are reused via manifest gating, ~5 min total).
# ============================================================================

scene: Warehouse_041
data_root: ./data
weights_root: ./weights
outputs_root: ./outputs
external_root: ./external

clip:
  start_sec: 0
  duration_sec: 30

detect:
  conf_thresh: 0.5
  nms_iou: 0.5

reid:
  similarity_thresh: 0.7

pose:
  keypoint_conf: 0.3

sct:
  track_buffer: 30
  match_thresh: 0.8

mct:
  cluster_thresh: 0.6
  min_track_len: 10
  hard_world_gate: true

eval:
  world_d_max: 1.0

tracking_params:                # real YACHIYO keys
  epsilon_scpt: 0.15            # v3.3: re-tuned on kp3 set (was 0.20 v3.1/v3.2)
  epsilon_mcpt: 0.37            # confirmed optimal at v3 on 2026-05-28
  time_period: 3
  short_track_th: 120          # E1 gate; lowering it adds <+0.003 (low-value fragments)
  keypoint_condition_th: 3     # v3.2: was 1; opening this MCPT gate = +0.1076 world HOTA
  replace_similarity_by_wcoordinate: true
  distance_type: min
  distance_th: 10               # m; world cannot-link threshold
  sim_th: 0.85
  delete_gid_th: 5000

world_projection:
  method: ankle_lower        # bbox_bottom | ankle_avg | ankle_lower | ankle_w_fallback
  ankle_min_conf: 0.3

world_smoothing:
  method: ema                # none | ema
  ema_alpha: 0.3

vram_min_free_gb: 4.0
fps: 30
