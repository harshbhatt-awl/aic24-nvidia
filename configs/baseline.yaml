# ============================================================================
#   v2 LOCKED BASELINE
# ============================================================================
#
# The reference all experiments are compared against:
#
#   * Models:   YOLO11 (detector) + SOLIDER Swin-Small (ReID, native repo path)
#               + RTMPose-l (pose). All three swapped in over the original
#               YOLOX-x / OSNet / HRNet stack from upstream YACHIYO.
#   * Tracker:  YACHIYO SCPT/MCPT with sweep-tuned thresholds (see below).
#   * Measured: image HOTA 0.758, IDF1 0.750, MOTA 0.781 on the 30s
#               Warehouse_001 clip; world HOTA 0.452 (improvement room).
#
# ⚠️ Code dependency
# ------------------
# This baseline is only reproducible from the model-upgrades branch
# (feat/model-upgrades-impl) — main does not yet carry the model swaps. Run the
# baseline from the worktree:
#
#   cd ~/.config/superpowers/worktrees/aic24-nvidia/model-upgrades
#   python experiments/run.py ensure-baseline
#
# If you later merge feat/model-upgrades-impl → main, you can run from main.
#
# Tuning provenance
# -----------------
# Tracking thresholds set from the 2026-05-27 epsilon_scpt sweep on the
# v2_solider run (epsilon_mcpt fixed at 0.37 during the sweep). epsilon_scpt
# 0.30 was the HOTA-optimal point on that grid; the rest are inherited from
# the previous tuned config.
#
# DO NOT edit this file to "try something" — that's what experiments/ is for.
# Update only when you decide a new tuning is officially the baseline, then
# rebuild outputs/baseline/ with `python experiments/run.py ensure-baseline
# --force`.
# ============================================================================

scene: Warehouse_001
data_root: ./data
weights_root: ./weights
outputs_root: ./outputs
external_root: ./external

clip:
  start_sec: 0
  duration_sec: 30

detect:
  conf_thresh: 0.5
  nms_iou: 0.5

reid:
  similarity_thresh: 0.7

pose:
  keypoint_conf: 0.3

sct:
  track_buffer: 30
  match_thresh: 0.8

mct:
  cluster_thresh: 0.6
  min_track_len: 10
  hard_world_gate: true

eval:
  world_d_max: 1.0

tracking_params:                # real YACHIYO keys
  epsilon_scpt: 0.30            # sweep-tuned 2026-05-27 (was 0.10)
  epsilon_mcpt: 0.37            # sweep-fixed value during the scpt scan
  time_period: 3
  short_track_th: 120
  keypoint_condition_th: 1
  replace_similarity_by_wcoordinate: true
  distance_type: min
  distance_th: 10               # m; world cannot-link threshold
  sim_th: 0.85
  delete_gid_th: 5000

vram_min_free_gb: 4.0
fps: 30
