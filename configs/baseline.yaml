# ============================================================================
#   v3.2 LOCKED BASELINE (v3.1 + MCPT keypoint-gate opened: kpt_cond_th 1->3)
# ============================================================================
#
# The reference all experiments are compared against:
#
#   * Models:   YOLO11 (detector) + SOLIDER Swin-Small (ReID, native repo path)
#               + RTMPose-l (pose). All three swapped in over the original
#               YOLOX-x / OSNet / HRNet stack from upstream YACHIYO.
#   * Tracker:  YACHIYO SCPT/MCPT with sweep-tuned thresholds (see below).
#   * World projection: RTMPose ankle-lower keypoint (planted foot) instead of
#                       bbox-bottom-center; EMA temporal smoothing at α=0.3.
#   * Measured: image HOTA 0.7800, IDF1 0.7670, MOTA 0.7888 (UNCHANGED from v3.1);
#               world HOTA 0.6359, DetA 0.6492, AssA 0.6240, IDF1 0.7802, dropped 5578.
#   * vs v3.1 (keypoint_condition_th=1): world HOTA +0.1076 (+20.4% relative),
#               DetA +0.2087, IDF1 +0.1020; image plane bit-identical (the gate
#               is MCT/world-linking only). AssA -0.0098 (acceptable: HOTA is
#               geometric-mean of DetA·AssA and the DetA recall gain dominates).
#   * vs v2 (bbox_bottom + no smoothing + eps_scpt=0.30): world HOTA +0.178.
#
# Tuning provenance
# -----------------
# - epsilon_scpt 0.20: 2026-05-28 fine-grained sweep against v3 baseline.
#   Original v2-era tuning at 0.30 was optimal under bbox_bottom + no
#   smoothing; v3's cleaner world coords let SCT cluster more aggressively.
#   0.20 wins world HOTA (+0.023 over v3); 0.25 wins image HOTA (+0.023) with
#   slightly smaller world gain (+0.017). Chose 0.20 because world HOTA is
#   the project's priority metric (the image↔world gap is the headline).
#   Below 0.20 (0.15, 0.10) over-fragments and regresses.
# - epsilon_mcpt 0.37 / sim_th 0.85: 2026-05-27 sweep; re-confirmed optimal
#   against v3 on 2026-05-28.
# - keypoint_condition_th 3: 2026-05-31 linking_gate_sweep. This MCPT gate
#   excludes a track from cross-camera clustering when its representative pose
#   `score > keypoint_condition_th` (lower score = better keypoints). At the
#   v3.1 value of 1 it dropped 12,126 detections (74% of the entire 55% linking
#   loss) — verified by aic24_nvidia/diagnostics/linking_attribution. Opening it
#   to 3 admits score-2/3 tracks (world DetA 0.44->0.65, world HOTA +0.1076);
#   4 (admit-all) regresses because score-4 poses are too noisy (AssA -0.036).
#   Attribution: docs/superpowers/specs/2026-05-31-mct-linking-attribution-design.md.
#   NOTE single-scene caveat: like all baseline tuning, fit on scene_044 only.
# - short_track_th 120 kept: the linking_gate_sweep showed lowering it
#   (60/30/15) moves world HOTA <+0.003 — the short-track (E1) drops are
#   low-value fragments, not worth admitting.
# - world_projection.method = ankle_lower: 2026-05-28 ankle_footpoint_sweep
#   (+0.0349 world HOTA standalone over bbox_bottom). ankle_avg and
#   ankle_w_fallback both regressed (-0.031); the planted-foot logic wins
#   because mid-stride averaging puts the projection point above the ground
#   plane.
# - world_smoothing.method = ema, ema_alpha = 0.3: 2026-05-28
#   world_smoother_sweep and ankle_lower_x_smoother sweeps. Plateau across
#   alpha 0.25-0.35; 0.3 marginally best at +0.0173 standalone, +0.0123 on
#   top of ankle_lower. α<0.2 over-smooths and regresses below baseline.
# - Sweep findings: docs/superpowers/notes/2026-05-28-world-projection-results.md
#
# Known no-op / insensitive knobs (worth a future diagnostic)
# -----------------------------------------------------------
# - hard_world_gate ON vs OFF: identical results at v3.1; the flag may not be
#   triggering. Worth one diagnostic to confirm it's actually wired.
# - sim_th 0.75 / 0.85 / 0.92: also identical at v3.1; the threshold may not
#   be binding (most cross-cam similarities cluster far from 0.85).
#
# Known remaining bottlenecks (not addressed on this branch)
# ----------------------------------------------------------
# - MCT cross-camera linking on cams 0394-0396: LARGELY FIXED at v3.2 — global
#   IDs per cam went 1/1/0 -> 7/9/1 by opening keypoint_condition_th. Residual
#   AssA (0.624) is now the world-HOTA ceiling: the association axis (eps_mcpt
#   re-tune on the enlarged kept set, then reid fine-tune
#   docs/superpowers/specs/2026-05-28-reid-fine-tune-design.md) is the next lever.
# - YOLO detector recall on cams 0395 (56%) / 0396 (35%): caps per-camera IMAGE
#   HOTA at 0.48 / 0.43. Deprioritized — detection is not the world-HOTA
#   bottleneck (verified 2026-05-31, detect_conf_sweep abandoned).
#
# DO NOT edit this file to "try something" — that's what experiments/ is for.
# Update only when you decide a new tuning is officially the baseline, then
# rebuild outputs/baseline/ with:
#   rm -rf outputs/baseline/{sct,mct,evaluate}
#   python pipeline.py all --config configs/baseline.yaml --run-id baseline
# (cached detect/reid/pose stages are reused via manifest gating, ~5 min total).
# ============================================================================

scene: Warehouse_001
data_root: ./data
weights_root: ./weights
outputs_root: ./outputs
external_root: ./external

clip:
  start_sec: 0
  duration_sec: 30

detect:
  conf_thresh: 0.5
  nms_iou: 0.5

reid:
  similarity_thresh: 0.7

pose:
  keypoint_conf: 0.3

sct:
  track_buffer: 30
  match_thresh: 0.8

mct:
  cluster_thresh: 0.6
  min_track_len: 10
  hard_world_gate: true

eval:
  world_d_max: 1.0

tracking_params:                # real YACHIYO keys
  epsilon_scpt: 0.20            # v3.1: fine-sweep optimal (was 0.30 in v3)
  epsilon_mcpt: 0.37            # confirmed optimal at v3 on 2026-05-28
  time_period: 3
  short_track_th: 120          # E1 gate; lowering it adds <+0.003 (low-value fragments)
  keypoint_condition_th: 3     # v3.2: was 1; opening this MCPT gate = +0.1076 world HOTA
  replace_similarity_by_wcoordinate: true
  distance_type: min
  distance_th: 10               # m; world cannot-link threshold
  sim_th: 0.85
  delete_gid_th: 5000

world_projection:
  method: ankle_lower        # bbox_bottom | ankle_avg | ankle_lower | ankle_w_fallback
  ankle_min_conf: 0.3

world_smoothing:
  method: ema                # none | ema
  ema_alpha: 0.3

vram_min_free_gb: 4.0
fps: 30
