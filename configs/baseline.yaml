# ============================================================================
#   v3 LOCKED BASELINE (world-projection improvements promoted)
# ============================================================================
#
# The reference all experiments are compared against:
#
#   * Models:   YOLO11 (detector) + SOLIDER Swin-Small (ReID, native repo path)
#               + RTMPose-l (pose). All three swapped in over the original
#               YOLOX-x / OSNet / HRNet stack from upstream YACHIYO.
#   * Tracker:  YACHIYO SCPT/MCPT with sweep-tuned thresholds (see below).
#   * World projection: RTMPose ankle-lower keypoint (planted foot) instead of
#                       bbox-bottom-center; EMA temporal smoothing at α=0.3.
#   * Measured: image HOTA 0.7580, IDF1 0.7495, MOTA 0.7806 (unchanged from v2);
#               world HOTA 0.5055 (was 0.4583, +0.047, +10.3% relative).
#
# Tuning provenance
# -----------------
# - epsilon_scpt 0.30 / epsilon_mcpt 0.37 / sim_th 0.85: 2026-05-27 sweep.
# - world_projection.method = ankle_lower: 2026-05-28 ankle_footpoint_sweep
#   (+0.0349 world HOTA standalone over bbox_bottom). ankle_avg and
#   ankle_w_fallback both regressed (-0.031); the planted-foot logic wins
#   because mid-stride averaging puts the projection point above the ground
#   plane.
# - world_smoothing.method = ema, ema_alpha = 0.3: 2026-05-28
#   world_smoother_sweep and ankle_lower_x_smoother sweeps. Plateau across
#   alpha 0.25-0.35; 0.3 marginally best at +0.0173 standalone, +0.0123 on
#   top of ankle_lower. α<0.2 over-smooths and regresses below baseline.
# - Sweep findings: docs/superpowers/notes/2026-05-28-world-projection-results.md
#
# Known remaining bottlenecks (not addressed on this branch)
# ----------------------------------------------------------
# - YOLO detector recall on cams 0395 (62%) / 0396 (35%): substantial GT
#   instances are not detected, capping per-camera image HOTA at 0.50 / 0.42.
# - MCT cross-camera linking on cams 0394-0396: only 1 / 1 / 0 global IDs
#   assigned to long tracks from these views. Likely ReID/calibration drift
#   for oblique views. Both are separate workstreams.
#
# DO NOT edit this file to "try something" — that's what experiments/ is for.
# Update only when you decide a new tuning is officially the baseline, then
# rebuild outputs/baseline/ with `python experiments/run.py ensure-baseline
# --force` (drops + rebuilds mct/evaluate; older detect/reid/pose are reused).
# ============================================================================

scene: Warehouse_001
data_root: ./data
weights_root: ./weights
outputs_root: ./outputs
external_root: ./external

clip:
  start_sec: 0
  duration_sec: 30

detect:
  conf_thresh: 0.5
  nms_iou: 0.5

reid:
  similarity_thresh: 0.7

pose:
  keypoint_conf: 0.3

sct:
  track_buffer: 30
  match_thresh: 0.8

mct:
  cluster_thresh: 0.6
  min_track_len: 10
  hard_world_gate: true

eval:
  world_d_max: 1.0

tracking_params:                # real YACHIYO keys
  epsilon_scpt: 0.30            # sweep-tuned 2026-05-27 (was 0.10)
  epsilon_mcpt: 0.37            # sweep-fixed value during the scpt scan
  time_period: 3
  short_track_th: 120
  keypoint_condition_th: 1
  replace_similarity_by_wcoordinate: true
  distance_type: min
  distance_th: 10               # m; world cannot-link threshold
  sim_th: 0.85
  delete_gid_th: 5000

world_projection:
  method: ankle_lower        # bbox_bottom | ankle_avg | ankle_lower | ankle_w_fallback
  ankle_min_conf: 0.3

world_smoothing:
  method: ema                # none | ema
  ema_alpha: 0.3

vram_min_free_gb: 4.0
fps: 30
