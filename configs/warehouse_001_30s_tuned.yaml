# Tuned variant for A/B vs the baseline config — see docs plan Task 9.
scene: Warehouse_001
data_root: ./data
weights_root: ./weights
outputs_root: ./outputs
external_root: ./external
clip:
  start_sec: 0
  duration_sec: 30
detect:
  conf_thresh: 0.5
  nms_iou: 0.5
reid:
  similarity_thresh: 0.7
pose:
  keypoint_conf: 0.3
sct:
  track_buffer: 30
  match_thresh: 0.8
mct:
  cluster_thresh: 0.6
  min_track_len: 10
  hard_world_gate: true
eval:
  world_d_max: 1.0          # m; world-distance gate for MCT HOTA matching
tracking_params:            # real YACHIYO keys; propagated to parameters_per_scene.py
  epsilon_scpt: 0.10
  time_period: 3
  epsilon_mcpt: 0.50
  short_track_th: 120
  keypoint_condition_th: 1
  replace_similarity_by_wcoordinate: true
  distance_type: min
  distance_th: 10           # m; world cannot-link threshold
  sim_th: 0.85
  delete_gid_th: 5000
vram_min_free_gb: 4.0
fps: 30
