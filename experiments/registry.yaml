# Experiment registry.
#
# Each experiment is a set of variants that share a hypothesis. A variant is
# baseline + a small overrides patch. The harness:
#   1. Deep-merges `overrides` into `base_config` to make a per-variant YAML.
#   2. Symlinks the cached upstream stages (from `outputs/baseline/`) into
#      `outputs/<exp_id>__<variant_name>/` so the run reuses heavy work.
#   3. Invokes `pipeline.py` for the variant; gated stages skip automatically.
#   4. Metrics land at `outputs/<exp_id>__<variant_name>/evaluate/metrics.json`.
#
# Stages, in order:
#     adapt → frames → detect → reid → pose → sct → mct → evaluate
#
# `rerun_from` says "reuse everything before this stage, re-run from this stage
# onward." Pick the EARLIEST stage whose behavior changes when you flip the knob:
#
#   override changes               -> rerun_from
#   --------------------------------|-----------
#   tracking_params.*               -> sct
#   mct.*                           -> mct        (only when sct path unchanged)
#   world_projection.*              -> mct
#   world_smoothing.*               -> evaluate
#   world_stitch.*                  -> evaluate
#   eval.world_d_max                -> evaluate
#   reid.similarity_thresh          -> sct        (consumes embeddings)
#   pose.keypoint_conf              -> sct
#   detect.conf_thresh / nms_iou    -> detect
#   clip.* / scene / fps            -> adapt      (full rerun)
#
# When in doubt, pick the EARLIER stage — gating is cheap, wrong-skip is silent.

experiments:

  - id: eps_mcpt_sweep
    description: "Sweep the cross-camera merge threshold around the baseline."
    hypothesis: "Tighter epsilon_mcpt reduces cross-camera false merges; looser is more permissive."
    base_config: configs/baseline.yaml
    rerun_from: sct
    variants:
      - name: "0.25"
        overrides:
          tracking_params:
            epsilon_mcpt: 0.25
      - name: "0.31"
        overrides:
          tracking_params:
            epsilon_mcpt: 0.31
      - name: "0.37"   # = baseline (sweep-fixed value)
        overrides:
          tracking_params:
            epsilon_mcpt: 0.37
      - name: "0.45"
        overrides:
          tracking_params:
            epsilon_mcpt: 0.45
      - name: "0.55"
        overrides:
          tracking_params:
            epsilon_mcpt: 0.55

  - id: eps_scpt_sweep
    description: "Sweep the per-camera SCPT clustering threshold around the baseline."
    hypothesis: "At v3 (ankle_lower + ema_0.3), cleaner world coords let SCT cluster more aggressively. 0.20 won the coarse sweep; probe finer around it."
    base_config: configs/baseline.yaml
    rerun_from: sct
    variants:
      - name: "0.10"
        overrides:
          tracking_params:
            epsilon_scpt: 0.10
      - name: "0.15"
        overrides:
          tracking_params:
            epsilon_scpt: 0.15
      - name: "0.20"
        overrides:
          tracking_params:
            epsilon_scpt: 0.20
      - name: "0.25"
        overrides:
          tracking_params:
            epsilon_scpt: 0.25
      - name: "0.30"   # = baseline
        overrides:
          tracking_params:
            epsilon_scpt: 0.30
      - name: "0.40"
        overrides:
          tracking_params:
            epsilon_scpt: 0.40
      - name: "0.50"
        overrides:
          tracking_params:
            epsilon_scpt: 0.50

  - id: hard_world_gate
    description: "A/B the hard world-distance cannot-link flag."
    hypothesis: "hard_world_gate=true prevents far-apart tracks from merging."
    base_config: configs/baseline.yaml
    rerun_from: mct
    variants:
      - name: "off"
        overrides:
          mct:
            hard_world_gate: false
      - name: "on"     # = baseline
        overrides:
          mct:
            hard_world_gate: true

  - id: sim_th_sweep
    description: "ReID similarity threshold used in MCPT merges."
    hypothesis: "Higher sim_th makes merges more conservative; lower is more permissive."
    base_config: configs/baseline.yaml
    rerun_from: sct
    variants:
      - name: "0.75"
        overrides:
          tracking_params:
            sim_th: 0.75
      - name: "0.85"   # = baseline
        overrides:
          tracking_params:
            sim_th: 0.85
      - name: "0.92"
        overrides:
          tracking_params:
            sim_th: 0.92

  - id: world_d_max
    description: "World-distance gate used in evaluate-time HOTA matching."
    hypothesis: "Looser gate inflates world HOTA; useful to report the precision/recall curve."
    base_config: configs/baseline.yaml
    rerun_from: evaluate
    variants:
      - name: "0.5m"
        overrides:
          eval:
            world_d_max: 0.5
      - name: "1.0m"   # = baseline
        overrides:
          eval:
            world_d_max: 1.0
      - name: "2.0m"
        overrides:
          eval:
            world_d_max: 2.0

  - id: ankle_footpoint_sweep
    description: "Use RTMPose ankle keypoints instead of bbox-bottom-center for world projection."
    hypothesis: "Ankle footpoints reduce 2D->world projection error, raising 3D-world HOTA."
    base_config: configs/baseline.yaml
    rerun_from: mct
    variants:
      - name: "bbox_bottom"          # = baseline (control)
        overrides:
          world_projection:
            method: bbox_bottom
      - name: "ankle_avg"
        overrides:
          world_projection:
            method: ankle_avg
      - name: "ankle_lower"
        overrides:
          world_projection:
            method: ankle_lower
      - name: "ankle_w_fallback"
        overrides:
          world_projection:
            method: ankle_w_fallback
            ankle_min_conf: 0.3      # explicit; matches the baseline default

  - id: world_smoother_sweep
    description: "EMA temporal smoothing on per-(frame, gid) world coords (eval-only)."
    hypothesis: "Smoothing removes per-frame projection noise, raising world HOTA / IDF1."
    base_config: configs/baseline.yaml
    rerun_from: evaluate
    variants:
      - name: "none"                 # = baseline (control)
        overrides:
          world_smoothing:
            method: none
      - name: "ema_0.3"
        overrides:
          world_smoothing:
            method: ema
            ema_alpha: 0.3
      - name: "ema_0.5"
        overrides:
          world_smoothing:
            method: ema
            ema_alpha: 0.5
      - name: "ema_0.7"
        overrides:
          world_smoothing:
            method: ema
            ema_alpha: 0.7

  - id: ankle_lower_x_smoother
    description: "Cross-product: best ankle method (ankle_lower) x EMA alpha sweep (extended low-alpha)."
    hypothesis: "ankle_lower + aggressive EMA compounds: world HOTA target ~0.50+."
    base_config: configs/baseline.yaml
    rerun_from: mct
    variants:
      - name: "ema_0.1"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.1
      - name: "ema_0.2"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.2
      - name: "ema_0.3"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.3
      - name: "ema_0.5"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.5
      # Fine-grained probe around the optimum (ema_0.3 leads at +0.047).
      - name: "ema_0.25"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.25
      - name: "ema_0.35"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.35
      - name: "ema_0.4"
        overrides:
          world_projection:
            method: ankle_lower
          world_smoothing:
            method: ema
            ema_alpha: 0.4

  - id: linking_gate_sweep
    description: "Sweep the two MCPT eligibility gates that drop 100% of unlinked detections (E2 keypoint 74%, E1 length 26%)."
    hypothesis: "Admitting more tracks past keypoint_condition_th / short_track_th raises world DetA; net world HOTA rises if the admitted tracks aren't too noisy for AssA."
    base_config: configs/baseline.yaml
    rerun_from: sct          # tracking_params.* -> sct (registry convention); detect/reid/pose reused
    variants:
      - name: "baseline"     # control: keypoint_condition_th=1, short_track_th=120
        overrides:
          tracking_params:
            keypoint_condition_th: 1
            short_track_th: 120
      - name: "kp2"          # E2: admit score<=2
        overrides:
          tracking_params:
            keypoint_condition_th: 2
      - name: "kp3"          # E2: admit score<=3
        overrides:
          tracking_params:
            keypoint_condition_th: 3
      - name: "kp4"          # E2: admit all (score<=4)
        overrides:
          tracking_params:
            keypoint_condition_th: 4
      - name: "st60"         # E1: admit tracks >=60
        overrides:
          tracking_params:
            short_track_th: 60
      - name: "st30"         # E1: admit tracks >=30
        overrides:
          tracking_params:
            short_track_th: 30
      - name: "st15"         # E1: admit tracks >=15
        overrides:
          tracking_params:
            short_track_th: 15

  - id: delete_gid_sweep
    description: "delete_gid_th gates MCPT's delete_small_global_id step. Baseline 5000 deletes ALL global ids (max gid has 1570 dets) -> empty fixed_whole -> pipeline silently falls back to RAW uncorrected output. Lowering it (<1570) activates the corrected output (tracklet interpolation + spurious-gid pruning)."
    hypothesis: "Activating the discarded MCPT correction (a sensible delete_gid_th) improves world AssA/DetA over the raw fallback; too-low over-prunes real ids."
    base_config: configs/baseline.yaml
    rerun_from: mct          # delete_gid_th is MCT-only (mcpt.delete_small_global_id); reuse cached sct
    variants:
      - name: "0"            # full correction, prune nothing
        overrides:
          tracking_params:
            delete_gid_th: 0
      - name: "50"
        overrides:
          tracking_params:
            delete_gid_th: 50
      - name: "100"
        overrides:
          tracking_params:
            delete_gid_th: 100
      - name: "300"
        overrides:
          tracking_params:
            delete_gid_th: 300
      - name: "800"
        overrides:
          tracking_params:
            delete_gid_th: 800
      - name: "5000"         # = baseline (correction discarded -> raw fallback)
        overrides:
          tracking_params:
            delete_gid_th: 5000

  - id: reid_finetune
    description: "Test the SOLIDER warehouse fine-tune (trained on scene_041/042/043, scene_044 held out) vs base SOLIDER. Targets AssA — the v3.3 world-HOTA ceiling."
    hypothesis: "Back-cam-adapted embeddings tighten cross-camera MCPT clustering -> higher AssA/world HOTA and more back-cam global IDs. Control = v3.3 baseline (base weights)."
    base_config: configs/baseline.yaml
    rerun_from: reid          # new reid weights -> re-extract embeddings; reuse detect; sct/mct/evaluate downstream
    variants:
      - name: "ft"
        overrides:
          reid:
            weights: solider_swin_small_warehouse_ft.pth

  - id: world_stitch_sweep
    description: "Sweep the post-MCT over-split stitch gate (sequential non-overlapping fragments). Targets the 32-pred-vs-25-GT over-segmentation; recovers the measured +0.0088 (clean-subset ceiling ~+0.019) world HOTA."
    hypothesis: "Merging sequential fragments close in world+time raises world AssA/IDF1 (DetA flat); net world HOTA rises if the merges are correct (no over-merge)."
    base_config: configs/baseline.yaml
    rerun_from: evaluate     # world_stitch.* -> evaluate (eval-only transform)
    variants:
      - name: "none"          # control: stitch off (= baseline)
        overrides:
          world_stitch:
            method: none
      - name: "g30_d0.5"
        overrides:
          world_stitch:
            method: endpoint_gap
            max_gap_frames: 30
            max_dist_m: 0.5
      - name: "g45_d0.6"
        overrides:
          world_stitch:
            method: endpoint_gap
            max_gap_frames: 45
            max_dist_m: 0.6
      - name: "g60_d0.75"
        overrides:
          world_stitch:
            method: endpoint_gap
            max_gap_frames: 60
            max_dist_m: 0.75
      - name: "g90_d1.0"
        overrides:
          world_stitch:
            method: endpoint_gap
            max_gap_frames: 90
            max_dist_m: 1.0
